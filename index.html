						<p class="mt-2 justify"
							data-es="<b>প্রত্যয় কুমার অধিকারী</b> একজন কম্পিউটার বিজ্ঞান গবেষক এবং বর্তমানে ইলেকট্রিক্যাল ইঞ্জিনিয়ারিং বিভাগের <i>কম্পিউটার টেকনোলজি</i> গ্রুপে পিএইচডি গবেষক হিসেবে যুক্ত আছেন। তিনি নটরডেম কলেজ, ঢাকা থেকে বিজ্ঞান শিক্ষার ভিত্তি গড়ে তোলেন এবং এনআইটি শিলচর থেকে কম্পিউটার বিজ্ঞান ও প্রকৌশলে স্নাতক সম্পন্ন করেন। তার গবেষণার মূল আগ্রহ কৃত্রিম বুদ্ধিমত্তা ভিত্তিক মানসিক স্বাস্থ্য সমাধান এবং প্রাকৃতিক ভাষা প্রক্রিয়াকরণে। তিনি ভাষা বোঝা ও যোগাযোগ উন্নত করার জন্য বিভিন্ন মডেল ও অ্যালগরিদম নিয়ে কাজ করছেন। পাশাপাশি, তিনি প্রযুক্তি সম্পর্কে ক্লিনিশিয়ানদের সচেতন করতে এবং তাদের কাজ সহজ করার জন্য টুল তৈরিতেও আগ্রহী, যাতে মানসিক স্বাস্থ্যসেবার ঘাটতি কিছুটা পূরণ করা যায়। আগে এনআইটি শিলচর, আইআইটি গুয়াহাটি, ট্রিপলআইটি হাইদ্রাবাদের গবেষণা দলের সঙ্গে কাজ করার অভিজ্ঞতা রয়েছে, এবং বর্তমানে এলসিএসটু রিসার্চ ল্যাবে গবেষণায় যুক্ত আছেন।"
							data-en="<b>Prottay Kumar Adhikary</b> is a Computer Science researcher currently pursuing his Ph.D. in the <i>Computer Technology</i> group, Department of Electrical Engineering at <i>IIT Delhi</i>. He completed his schooling at <i>Notre Dame College, Dhaka</i> and earned his undergraduate degree in Computer Science & Engineering from <i>NIT Silchar</i>. His current work focuses on AI-driven solutions for mental health, with a strong emphasis on natural language processing. He develops models and algorithms to improve language understanding and communication. He is also involved in educating clinicians about technology through initiatives like <i>The Technology-Informed Therapist (TINT)</i>, and is interested in building tools that reduce clinicians’ workload and help bridge gaps in the mental healthcare workforce. He has previously worked with research teams at NIT Silchar, IIT Guwahati, IIIT Hyderabad and is currently part of the LCS2 Research Lab.">

						<h4 id="researchinterestsH4" class="mt-2" data-es="আগ্রহী গবেষণা" data-en="Research Interests">
						</h4>

						<p class="mt-1" style="text-align: justify;"
							data-es="গবেষণার আগ্রহ মানসিক স্বাস্থ্যের উপর কেন্দ্রীভূত হয়, বিশেষ করে কাউন্সেলিং থেরাপি, ইন্টারভেনশন এবং সাইকোথেরাপিতে; কৃত্ৰিম বুদ্ধিমত্তা এবং ভাষা প্রক্রিয়াকরণের সাহায্যে। মূল অবদানের মধ্যে রয়েছে সংলাপ সনাক্তকরণ, কাউন্সেলিং কথোপকথনের সংক্ষিপ্তকরণ এবং কথোপকথনের দৃষ্টিকোণের উপর ভিত্তি করে কথোপকথন সংক্ষিপ্তকরণ। বিভিন্ন ধরণের ডেটাসেট থেকে তথ্য ব্যবহার করে মানসিক স্বাস্থ্যের লক্ষণগুলিও পরীক্ষা করা এবং কথোপকথনের উপর ভিত্তি করে মানসিক স্বাস্থ্যের নতুন কথোপকথন তৈরি করা গবেষণার একটি অংশ। এছাড়াও, তৃণমূলে জড়িত থাকার জন্য এনজিওদের সাথে অংশীদারিত্বের সাহায্যে জ্ঞান ও নিউরোসাইকিয়াট্রিক ভিত্তিক গবেষণা মাধ্যমে: মানসিক স্বাস্থ্য, মাসিক স্বাস্থ্য, যৌন স্বাস্থ্য, এবং আত্মহত্যার হস্তক্ষেপের কারণ অন্বেষণ করা।"
							data-en="Research interests focus on mental health, specifically counseling therapies, interventions, and psychotherapy using AI and NLP techniques. Key contributions include identifying dialogue acts, summarizing counseling conversations, and aspect-based summarization. Research also examines mental health symptoms using information from different kind of datasets and generates dialogues that can support mental health based on dialogue acts. Collaborating with mental health professionals on cognitive and neuropsychiatric studies and exploring menstrual health, sexual health, and suicide intervention through NGO partnerships for grassroots engagement.">
						</p>

						<p class="mt-1" style="text-align: justify;"
							data-es="গবেষণার আগ্রহ মূলত মানসিক স্বাস্থ্যকে কেন্দ্র করে, বিশেষ করে কাউন্সেলিং থেরাপি, ইন্টারভেনশন এবং সাইকোথেরাপিতে কৃত্রিম বুদ্ধিমত্তা ও ভাষা প্রক্রিয়াকরণের প্রয়োগে। এই কাজের মাধ্যমে সংলাপ সনাক্তকরণ, কাউন্সেলিং কথোপকথনের সংক্ষিপ্তকরণ এবং বিভিন্ন দৃষ্টিকোণ থেকে কথোপকথন বিশ্লেষণ ও সারসংক্ষেপ তৈরি করা হয়। বিভিন্ন ধরনের ডেটাসেট ব্যবহার করে মানসিক স্বাস্থ্যের লক্ষণ বিশ্লেষণ এবং সহায়ক কথোপকথন তৈরি করাও এর অংশ। পাশাপাশি, মানসিক স্বাস্থ্য পেশাজীবীদের সাথে কাজ করে এবং এনজিওগুলির সহযোগিতায় তৃণমূল পর্যায়ে যুক্ত থেকে মাসিক স্বাস্থ্য, যৌন স্বাস্থ্য এবং আত্মহত্যা প্রতিরোধ নিয়ে গবেষণা করা হয়। ভবিষ্যতে লক্ষ্য হলো এমন প্রযুক্তি তৈরি করা যা ক্লিনিশিয়ানদের কাজ সহজ করে, সময় বাঁচায় এবং মানসিক স্বাস্থ্যসেবার ঘাটতি পূরণে সহায়তা করে।"
							data-en="His research focuses on mental health, particularly counseling therapy, interventions, and psychotherapy, using AI and natural language processing. He works on problems such as dialogue act identification, summarization of counseling conversations, and aspect-based understanding of therapeutic dialogues. This also includes analyzing mental health signals from diverse datasets and generating supportive, structured conversations grounded in dialogue behavior.

							Beyond core NLP research, he collaborates with clinicians and mental health professionals on cognitive and neuropsychiatric studies, while also engaging with NGOs to understand grassroots challenges across areas such as menstrual health, sexual health, and suicide intervention.

							His broader vision is to build practical, trustworthy AI systems that support clinicians in their day-to-day work—reducing effort, saving time, and helping bridge the gap in mental healthcare access at scale.">
						</p>
