						<div class="trnsf-thin" data-es="<i>আইআইটি দিল্লি, ২০২৪ - চলমান</i>"
							data-en="<i>Indian Institute of Technology Delhi, 2024-Ongoing </i>"> </div>

						<p class="mt-1 justify"
							data-es="কোর্সওয়ার্কে ডিপলার্নিং ফর এনএলপি, ক্লাউড কম্পিউটিং এবং ডেটা ভিজ্যুয়ালাইজেশন, সামাজিক নেটওয়ার্ক বিশ্লেষণ, কম্পিউটেশনাল নার্ভোসায়েন্স, লার্জ ল্যাঙ্গুয়েজ মডেলের পরিচিতি, মনস্তাত্ত্বিক হস্তক্ষেপ, নৃতাত্ত্বিকতা: তত্ত্ব, অনুশীলন এবং সমালোচনা, এবং মানবিক মূল্যবোধ এবং প্রযুক্তি অন্তর্ভুক্ত রয়েছে। গবেষণা ডেটাসেট ব্যবহার করে লার্জ ল্যাঙ্গুয়েজ মডেলের ক্ষমতা ব্যবহার করে মানসিক স্বাস্থ্য এর কার্যকর মডেল তৈরির উপর কেন্দ্রীভূত। এনএলপির সর্বশেষ অগ্রগতিগুলি অন্বেষণ করে মানসিক স্বাস্থ্য ডোমেনে উল্লেখযোগ্য অবদান রাখা ও ব্যক্তি এবং সম্প্রদায়ের মঙ্গল সাধন করাই ভবিষ্যৎ উদ্দেশ্য।"

					<div class="row mt-3 language">
						<h2 data-es="(স্নাতক) কম্পিউটার সাইন্স & ইঞ্জিনিয়ারিং | বি. টেক"

						<div class="trnsf-thin" data-es="<i>এনআইটি শিলচর, ২০১৯-২০২৩</i> | <i> সিজিপিএ ৮.৩২/১০</i>"
							data-en="<i>National Institute Of Technology Silchar, 2019-2023</i> | <i> CGPA 8.32/10</i>">
						</div>

						<p class="mt-1 justify"
							data-es="এই কোর্সটি কম্পিউটার বিজ্ঞান এবং প্রকৌশল শিক্ষার মৌলিক উপাদানগুলির ব্যাপক একটি শ্রেণি অন্তর্ভুক্ত করে। এটি পরিবেশ বিজ্ঞান এবং প্রকৌশল দিয়ে শুরু হয়, যা বাস্তবগত অনুশাসনের অধ্যায়ন এবং রাসায়নিক প্রক্রিয়ার মৌলিক সিদ্ধান্তগুলির জ্ঞান প্রদান করে। প্রোগ্রামিং এবং বেসিক ইলেকট্রনিক্স কোড করতে এবং ইলেকট্রনিক সিস্টেম ডিজাইন করতে প্রয়োজনীয় দক্ষতা প্রদান করে। গণিত ১ এবং বেসিক ইলেকট্রিক্যাল ইঞ্জিনিয়ারিং আমাদের গণিতমৌল এবং প্রকৌশল জ্ঞান সুন্দর করে। কমিউনিকেটিভ ইংলিশ দ্বারা কার্যকর যোগাযোগ নিশ্চিত করা হয়, যেখানে গণিত ২ এবং ইঞ্জিনিয়ারিং মেকানিক্স আমাদের সমস্যা সমাধানের দক্ষতা শক্তিশালী করে। পদার্থবিজ্ঞান আমাদের বিশ্বের নিয়মনিরূপণ করার জন্য প্রাকৃতিক আইনের জ্ঞান গভীর করে। এই কোর্সটি নিয়ে যাত্রা শুরু হয় কম্পিউটার বিজ্ঞানের জগতে, যেখানে: ডেটা স্ট্রাকচার, ডিসক্রিট স্ট্রাকচার, এবং ইলেকট্রনিক সার্কিট এবং সুইচিং এর মত বিষয়গুলি রয়েছে। মাইক্রোপ্রসেসর এবং মাইক্রোকন্ট্রোলার, গণিত ৩, কম্পিউটেশন থিওরি, কম্পিউটার আর্কিটেকচার এবং সংগঠন, এবং এলগরিদম সম্প্রতি কম্পিউটার বিজ্ঞানে এক দৃঢ দক্ষতা প্রদান করে। এই কোর্সটি তরঙ্গ এবং ডেটা যোগাযোগ, কম্পিউটার নেটওয়ার্ক, ডেটাবেস ম্যানেজমেন্ট সিস্টেম, অপারেটিং সিস্টেম, এবং সফটওয়্যার ইঞ্জিনিয়ারিং সহ কম্পিউটার সিস্টেমের নেটওয়ার্কিং, সংরক্ষণ এবং পরিচালনার দিকে পরিচিতি দেয়। এটি গ্রাফ থিওরি, প্রোগ্রামিং ভাষার সিদ্ধান্ত, কম্পাইলার ডিজাইন, গ্রাফিক্স এবং মাল্টিমিডিয়া, ন্যাচারাল ল্যাঙ্গুয়েজ প্রসেসিং, এবং ব্লকচেইন এর পরিচয় প্রদান করে, যা কম্পিউটার বিজ্ঞানের বিশেষ এলাকাগুলির গভীরতা বোঝার সম্ভাবনা দেয়। এই বিষয়গুলি নিয়ে এই কোর্সটি একটি পরিপূর্ণ শিক্ষা প্রদান করে, যা কম্পিউটার বিজ্ঞান এবং প্রকৌশলের পরিবর্তনশীল এবং সর্বদা উন্নত ক্ষেত্রে প্রস্তুত হতে সাহায্য করে।"
							data-en="The course covers an extensive range of subjects that form the core of our education in computer science and engineering. It starts with Environmental Science & Engineering and Chemistry, which provides an understanding of sustainable practices and the foundational principles of chemical processes. Introduction to Programming and Basic Electronics equips the necessary skills to code and design electronic systems. Mathematics I and Basic Electrical Engineering enhance our mathematical and engineering knowledge. Communicative English ensures effective communication, while Mathematics II and Engineering Mechanics strengthen our problem-solving abilities. Physics deepens our understanding of the natural laws governing our world. Moving forward, this course delves into the realm of computer science with subjects like Data Structures, Discrete Structures, and Electronic Circuit and Switching. Microprocessors and Microcontrollers, Mathematics-III, Theory of Computation, Computer Architecture & Organization, and Algorithms provide us with a solid foundation in computer science theory and practice. This course also explores Signal & Data Communication, Computer Network, Database Management Systems, Operating System, and Software Engineering to gain insight into the networking, storage, and management aspects of computer systems. It also covers Graph Theory, Principles of Programming Language, Compiler Design, Graphics & Multimedia, Natural Language Processing, and Introduction to Blockchain, which offers a deeper understanding of specialized areas within computer science. By covering these subjects, it equips a comprehensive education that helps in preparing for the dynamic and ever-evolving field of computer science and engineering.">
						</p>

					<div class="row mt-3 language">
						<h2 data-es="উচ্চ মাধ্যমিক স্কুল সার্টিফিকেট (বিজ্ঞান)"

						<div class="trnsf-thin" data-es="<i>নটর ডেম কলেজ ঢাকা, ২০১৬-২০১৮</i> | <i>জিপিএ ৫/৫</i>"
